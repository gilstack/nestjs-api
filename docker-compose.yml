services:
  postgres:
    container_name: storagie_postgres
    image: bitnami/postgresql:latest
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: database
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - storagie_network
    labels:
      - "service=postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d database"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: storagie_redis
    image: bitnami/redis:latest
    command: redis-server --protected-mode no --stop-writes-on-bgsave-error no
    restart: always
    ports:
      - "6379:6379"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - redis_data:/data
    networks:
      - storagie_network
    labels:
      - "service=redis"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    container_name: storagie_mailhog
    image: mailhog/mailhog:latest
    restart: always
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI port
    networks:
      - storagie_network
    labels:
      - "service=mailhog"

volumes:
  postgres_data:
  redis_data:

networks:
  storagie_network:
    driver: bridge
